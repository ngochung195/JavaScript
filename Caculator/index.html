<style>
    input[type="number"] {
        width: 200px;
        padding: 8px;
    }

    input[type="submit"] {
        background-color: rgb(194, 194, 194);
        width: 120px;
        padding: 5px;
        margin-top: 10px;
        border: none;
    }

    input[type="submit"]:hover {
        background-color: rgb(129, 126, 126);
    }
</style>

<body>
    <h1>Caculator</h1>
    <form id="caculatorForm">
        <input type="number" id="num1" required placeholder="Nhập số thứ nhất">
        <input type="number" id="num2" required placeholder="Nhập số thứ hai">
        <br>
        <input type="submit" id="add" value="Addition(+)">
        <input type="submit" id="sub" value="Subtraction(-)">
        <input type="submit" id="mul" value="Multiplication(x)">
        <input type="submit" id="div" value="Division(/)">
        <p id="result"></p>
    </form>

    <script src="app.js"></script>
</body>
